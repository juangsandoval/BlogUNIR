---
layout: default
---

<article class="post">
  <header class="post-header">
    <p class="post-date">{{ page.date | date: "%d/%m/%Y" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.image %}
      <figure class="post-figure">
        <img class="post-image" src="{{ page.image | relative_url }}" alt="{{ page.image_alt }}">
        {% if page.image_credit %}
          <figcaption>{{ page.image_credit }}</figcaption>
        {% endif %}
      </figure>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <p class="back-link">
    <a href="{{ '/' | relative_url }}">← Volver al inicio</a>
  </p>
</article>
